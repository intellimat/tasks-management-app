name: Build and Deploy

on:
  push:
    branches:
      - master # Triggers only on pushes to master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24" # Adjust to your Node version
        #   cache: "npm" # Caches npm dependencies for faster builds

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Create deployment package
        run: |
          # Package only what's needed to run the app
          mkdir deploy-package

          cp -r .next deploy-package/
          cp -r public deploy-package/ 2>/dev/null || :
          cp -r node_modules deploy-package/
          cp package.json deploy-package/

          # Create tarball for efficient transfer
          tar -czf deploy.tar.gz -C deploy-package .

      - name: Deploy to Azure VM
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "deploy.tar.gz"
          target: "/home/deploymentuser/"

      - name: Extract and restart application
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Extract to app directory
            cd /var/www/tasks-management-app

            # Delete old deployment
            rm -rf .next 
            rm -rf public
            rm -rf node_modules
            rm -rf package.json

            tar -xzf /home/deploymentuser/deploy.tar.gz

            # Restart with PM2
            pm2 restart tasks-management-app

            # Clean up
            rm /home/deploymentuser/deploy.tar.gz
      - name: Trigger Azure Function for storing deployment information
        run: |
          curl --location '${{ secrets.AZ_FUNCTION_URL }}' \
          --header 'x-functions-key: ${{ secrets.AZ_FUNCTION_KEY }}' \
          --header 'Content-Type: application/json' \
          --data '{
              "deployment_info": {
                  "deployedAt": "${{ github.event.head_commit.timestamp }}",
                  "commitSha": "${{ github.sha }}",
                  "commitMessage": "${{ github.event.head_commit.message }}",
                  "branch": "${{ github.ref_name }}",
                  "author": "${{ github.event.head_commit.author.name }}"
              }
          }'
      - name: Health Check After Deploy
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.APP_URL }})
          if [ $HTTP_CODE -ne 200 ]; then
            echo "❌ Health check failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Health check passed (HTTP $HTTP_CODE)"